<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroCloud v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050507; color: #f4f4f5; font-family: 'Inter', sans-serif; margin: 0; }
        .glass { background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        
        /* Layout Fix: Absolute CSS Definitionen */
        .grid-main { display: grid; gap: 1.5rem; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        .mobile-view .grid-main { grid-template-columns: repeat(2, 1fr) !important; gap: 0.75rem !important; }
        
        .game-card { cursor: pointer; border-radius: 1.5rem; background: #111114; padding: 1rem; transition: 0.2s; border: 1px solid transparent; }
        .game-card:hover { border-color: #6366f1; background: #16161b; }

        #emu-layer { display: none; position: fixed; inset: 0; z-index: 9999; background: #000; }
        #game-container { width: 100vw; height: 100vh; }
        
        /* Radio Animation */
        .wave { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
        .wave div { width: 2px; background: #6366f1; animation: wave-anim 1s infinite alternate; }
        @keyframes wave-anim { from { height: 2px; } to { height: 12px; } }
    </style>
</head>
<body id="app-root">

    <div id="main-ui" class="max-w-6xl mx-auto p-6">
        <header class="flex flex-col md:flex-row justify-between items-center py-10 gap-6">
            <div>
                <h1 class="text-4xl font-black italic uppercase tracking-tighter">RetroCloud <span class="text-indigo-500">v26(1.0)</span></h1>
                <div class="mt-2 flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full border border-white/5">
                    <div class="wave"><div></div><div style="animation-delay:0.2s"></div><div style="animation-delay:0.4s"></div></div>
                    <span class="text-[9px] font-bold uppercase tracking-widest">Lofi Station</span>
                    <button onclick="toggleRadio()" id="radio-btn" class="text-[9px] bg-indigo-600 px-3 py-1 rounded-full font-black uppercase">Play</button>
                </div>
            </div>

            <div class="flex gap-3">
                <button onclick="changeLayout('pc')" class="glass px-4 py-2 rounded-xl text-[10px] font-bold">PC</button>
                <button onclick="changeLayout('mobile')" class="glass px-4 py-2 rounded-xl text-[10px] font-bold">MOBILE</button>
                <button onclick="toggleSettings(true)" class="bg-white text-black px-6 py-2 rounded-xl text-[10px] font-bold">SETTINGS</button>
            </div>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-12">
            <label class="bg-indigo-600 p-6 rounded-3xl cursor-pointer hover:bg-indigo-500 transition-all text-center">
                <input type="file" id="file-save" class="hidden" accept=".gba,.gb,.gbc,.sfc,.nes,.md,.zip">
                <span class="block text-xs font-black uppercase tracking-widest">Cloud Store (ROMs)</span>
            </label>
            <label class="bg-zinc-800 p-6 rounded-3xl cursor-pointer hover:bg-zinc-700 transition-all text-center border border-white/5">
                <input type="file" id="file-direct" class="hidden" accept=".nds,.n64,.iso,.3ds,.cci">
                <span class="block text-xs font-black uppercase tracking-widest text-indigo-400">Direct Launch (3DS/PSP/MAME/NDS/etc.)</span>
            </label>
        </div>

        <div id="library-content"></div>
    </div>

    <div id="settings-ui" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-6">
        <div class="glass max-w-md w-full p-8 rounded-[2.5rem]">
            <h2 class="text-xl font-black uppercase mb-6 text-center italic">Settings</h2>
            <div class="space-y-4">
                <select id="vfx-filter" class="w-full bg-zinc-900 p-4 rounded-xl text-xs font-bold border border-white/10 outline-none">
                    <option value="none">Kein Filter (Performance)</option>
                    <option value="crt">CRT Retro</option>
                    <option value="hq4x">HD Smooth</option>
                </select>
                <div class="flex gap-2">
                    <button onclick="exportData()" class="flex-1 bg-zinc-800 py-3 rounded-xl text-[10px] font-bold">BACKUP</button>
                    <label class="flex-1 bg-zinc-800 py-3 rounded-xl text-[10px] font-bold text-center cursor-pointer">
                        RESTORE <input type="file" id="import-json" class="hidden" accept=".json">
                    </label>
                </div>
                <button onclick="clearAllData()" class="w-full py-3 text-red-500 text-[9px] font-black uppercase opacity-50 hover:opacity-100">Reset Database</button>
                <button onclick="toggleSettings(false)" class="w-full py-3 bg-white text-black rounded-xl font-bold text-xs mt-4">SCHLIESSEN</button>
            </div>
        </div>
    </div>

    <div id="emu-layer">
        <button onclick="location.reload()" class="absolute top-4 right-4 z-[10000] bg-red-600 text-white px-6 py-2 rounded-full text-[10px] font-bold">BEENDEN</button>
        <div id="game-container"></div>
    </div>

    <audio id="lofi-audio" loop src="https://stream.zeno.fm/0r0xa792kwzuv"></audio>

    <script>
        let db;
        const extensionMap = { 'gba':'gba','gb':'gba','gbc':'gba','sfc':'snes','nes':'nes','md':'segaMD','nds':'desmume','n64':'n64','iso':'psx','3ds':'citra','cci':'citra' };

        const req = indexedDB.open("RetroCloud_v26(1.0)", 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore("games", { keyPath: "name" });
        req.onsuccess = e => { db = e.target.result; renderLibrary(); };

        // LAYOUT FIX
        function changeLayout(type) {
            const root = document.getElementById('app-root');
            if(type === 'mobile') root.classList.add('mobile-view');
            else root.classList.remove('mobile-view');
            localStorage.setItem('retro_layout_v23', type);
        }
        if(localStorage.getItem('retro_layout_v23') === 'mobile') changeLayout('mobile');

        // RADIO FIX
        function toggleRadio() {
            const a = document.getElementById('lofi-audio');
            const b = document.getElementById('radio-btn');
            if(a.paused) { a.play(); b.innerText = "Stop"; b.classList.replace('bg-indigo-600', 'bg-red-600'); }
            else { a.pause(); b.innerText = "Play"; b.classList.replace('bg-red-600', 'bg-indigo-600'); }
        }

        function toggleSettings(s) { document.getElementById('settings-ui').classList.toggle('hidden', !s); }

        // FILE HANDLER
        document.getElementById('file-save').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const reader = new FileReader();
            reader.onload = () => {
                db.transaction("games","readwrite").objectStore("games").put({
                    name: f.name, core: extensionMap[f.name.split('.').pop().toLowerCase()] || 'gba', data: reader.result
                }).oncomplete = renderLibrary;
            };
            reader.readAsDataURL(f);
        };

        document.getElementById('file-direct').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const ext = f.name.split('.').pop().toLowerCase();
            launch(URL.createObjectURL(f), extensionMap[ext] || 'citra');
        };

        async function renderLibrary() {
            const container = document.getElementById('library-content');
            const games = await new Promise(res => db.transaction("games").objectStore("games").getAll().onsuccess = e => res(e.target.result));
            container.innerHTML = "";
            const cores = [...new Set(games.map(g => g.core))];
            cores.forEach(sys => {
                const sysGames = games.filter(g => g.core === sys);
                container.innerHTML += `<h2 class="text-[9px] font-bold text-indigo-400 uppercase tracking-widest mb-4 mt-8">${sys}</h2>
                <div class="grid-main">${sysGames.map(g => `<div class="game-card" onclick="startStored('${g.name}')">
                    <div class="text-[10px] font-bold truncate text-white uppercase mb-2">${g.name}</div>
                    <button onclick="event.stopPropagation(); deleteGame('${g.name}')" class="text-red-500 text-[9px] font-bold">LÖSCHEN</button>
                </div>`).join('')}</div>`;
            });
        }

        async function startStored(n) {
            const g = await new Promise(res => db.transaction("games").objectStore("games").get(n).onsuccess = e => res(e.target.result));
            launch(g.data, g.core);
        }

        function launch(url, core) {
            document.getElementById('emu-layer').style.display = 'block';
            window.EJS_player = '#game-container';
            window.EJS_core = core;
            window.EJS_gameUrl = url;
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            window.EJS_startOnLoaded = true;
            window.EJS_settings = { "shader": document.getElementById('vfx-filter').value };
            const s = document.createElement('script');
            s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            document.body.appendChild(s);
        }

        document.getElementById('import-json').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = (ev) => {
                const data = JSON.parse(ev.target.result);
                const tx = db.transaction("games", "readwrite");
                data.forEach(g => tx.objectStore("games").put(g));
                tx.oncomplete = () => renderLibrary();
            };
            r.readAsText(f);
        };

        function deleteGame(n) { if(confirm("Löschen?")) { db.transaction("games","readwrite").objectStore("games").delete(n).oncomplete = renderLibrary; } }
        async function exportData() {
            const games = await new Promise(res => db.transaction("games").objectStore("games").getAll().onsuccess = e => res(e.target.result));
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(games)], {type: "application/json"})); a.download = "RetroCloud_Backup.json"; a.click();
        }
        function clearAllData() { if(confirm("Reset?")) { indexedDB.deleteDatabase("RetroCloud_v23"); location.reload(); } }
    </script>
</body>
</html>
