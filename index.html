<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RetroCloud v27.6</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RetroCloud">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --accent: #6366f1; 
            --bg: #050507; 
        }

        /* iOS Fix: Verhindert Scrollen des Bodys im Hintergrund */
        html, body { 
            background: var(--bg); 
            color: #fafafa; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Scrollbarer Bereich für die Library */
        #main-ui { 
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: env(safe-area-inset-bottom);
            padding-top: env(safe-area-inset-top);
        }

        .glass { background: rgba(18, 18, 22, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; }
        
        .game-card { 
            background: #0f0f13; 
            border-radius: 1.2rem; 
            border: 1px solid rgba(255,255,255,0.03); 
            padding: 1.2rem; 
            display: flex; 
            flex-direction: column; 
            transition: 0.2s; 
            cursor: pointer; 
        }

        .game-title { 
            font-size: 0.85rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            word-break: break-word; 
            line-height: 1.3; 
            color: #fff; 
            margin-bottom: 1rem; 
        }

        /* iOS Fix: Form-Elemente brauchen 16px um Auto-Zoom zu verhindern */
        input, textarea, button { font-size: 16px !important; }

        #emu-layer { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 9999; 
            background: #000;
            height: 100vh;
            height: -webkit-fill-available;
        }

        .exit-trigger { 
            position: fixed; 
            top: env(safe-area-inset-top, 15px); 
            right: 15px; 
            width: 35px; 
            height: 35px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 50%; 
            z-index: 10005; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid rgba(255,255,255,0.1); 
            color: rgba(255,255,255,0.5); 
        }

        /* Verstecke Scrollbars für sauberen Look */
        #main-ui::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="main-ui" class="max-w-4xl mx-auto px-6 pt-10 pb-32">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic uppercase text-white">Retro<span class="text-indigo-500">Cloud</span></h1>
                <div id="cloud-status" class="text-[8px] font-bold uppercase tracking-widest mt-2 flex items-center gap-2">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-red-500"></span>
                    <span id="status-text" class="text-zinc-500">Cloud Disconnected</span>
                </div>
            </div>
            <button onclick="loginToDropbox()" class="glass px-4 py-2 rounded-xl text-[9px] font-black uppercase text-zinc-400">Link Dropbox</button>
        </header>

        <label class="block mb-12 p-8 rounded-[2rem] bg-indigo-600/5 border-2 border-dashed border-indigo-600/20 cursor-pointer text-center active:scale-95 transition-transform">
            <input type="file" id="rom-upload" class="hidden" accept=".gba,.gb,.gbc,.nes,.sfc,.smc,.md,.n64,.nds">
            <span class="block text-2xl mb-2">🕹️</span>
            <span class="block text-[10px] font-black uppercase italic text-indigo-400">Add ROM to Library</span>
        </label>

        <div id="library-container" class="space-y-12"></div>
    </div>

    <div id="options-ui" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
        <div class="glass w-full max-w-md p-8 rounded-[2.5rem]">
            <h2 id="opt-title" class="text-xl font-black uppercase italic mb-6 text-center text-white">Options</h2>
            <textarea id="cheat-input" class="w-full h-40 bg-zinc-900 rounded-2xl p-4 text-[12px] font-mono border border-white/5 outline-none mb-6 text-indigo-300" placeholder="Paste Cheats here..."></textarea>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="saveOptions()" class="py-4 bg-indigo-600 text-white rounded-2xl font-black text-[10px] uppercase">Save</button>
                <button onclick="toggleOptions(false)" class="py-4 bg-zinc-800 rounded-2xl font-black text-[10px] uppercase text-zinc-400">Back</button>
            </div>
        </div>
    </div>

    <div id="emu-layer">
        <div class="exit-trigger" onclick="location.reload()">✖</div>
        <div id="game-container" style="width:100vw;height:100vh;"></div>
    </div>

    <script>
        const DBX_APP_KEY = 'jd1mz866barkxm1'; 
        const REDIRECT_URI = window.location.href.split('#')[0];
        let db, currentFileName = "", currentOptGame = "";

        // DB Setup
        const request = indexedDB.open("RetroCloud_DBX", 1);
        request.onupgradeneeded = e => {
            const dbRef = e.target.result;
            dbRef.createObjectStore("games", { keyPath: "name" });
        };
        request.onsuccess = e => { 
            db = e.target.result; 
            renderLibrary(); 
            checkCloudStatus(); 
        };

        // Dropbox
        function loginToDropbox() {
            const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${DBX_APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
            window.location.href = authUrl;
        }

        function checkCloudStatus() {
            if (window.location.hash.includes("access_token=")) {
                const token = new URLSearchParams(window.location.hash.substring(1)).get("access_token");
                localStorage.setItem("dbx_token", token);
                window.location.hash = "";
            }
            const token = localStorage.getItem("dbx_token");
            if (token) {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
                document.getElementById('status-text').innerText = "Cloud Active";
                document.getElementById('status-text').className = "text-green-500";
            }
        }

        async function syncToCloud(fileName, blob) {
            const token = localStorage.getItem("dbx_token");
            if (!token || !blob) return;
            try {
                await fetch('https://content.dropboxapi.com/2/files/upload', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Dropbox-API-Arg': JSON.stringify({ path: '/' + fileName + '.sav', mode: 'overwrite' }),
                        'Content-Type': 'application/octet-stream'
                    },
                    body: blob
                });
            } catch(e) { console.error("Sync failed", e); }
        }

        // Library
        document.getElementById('rom-upload').onchange = e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = () => {
                const coreMap = {'gba':'gba','gb':'gba','gbc':'gba','nes':'nes','sfc':'snes','smc':'snes','md':'segaMD','n64':'n64','nds':'desmume'};
                const ext = f.name.split('.').pop().toLowerCase();
                db.transaction("games","readwrite").objectStore("games").put({
                    name: f.name, 
                    core: coreMap[ext] || 'gba', 
                    data: r.result, 
                    cheats: ""
                }).oncomplete = renderLibrary;
            };
            r.readAsDataURL(f);
        };

        async function renderLibrary() {
            const games = await new Promise(res => db.transaction("games").objectStore("games").getAll().onsuccess = e => res(e.target.result));
            const container = document.getElementById('library-container');
            container.innerHTML = "";
            
            const cores = [...new Set(games.map(g => g.core))];
            cores.forEach(sys => {
                const sec = document.createElement('div');
                sec.innerHTML = `<h2 class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.4em] mb-4">${sys}</h2><div class="game-grid"></div>`;
                games.filter(g => g.core === sys).forEach(game => {
                    const card = document.createElement('div');
                    card.className = "game-card";
                    card.innerHTML = `
                        <div class="game-title" onclick="launchGame('${game.name}')">${game.name.split('.')[0]}</div>
                        <div class="mt-auto flex gap-4 pt-4 border-t border-white/5">
                            <button onclick="openOptions('${game.name}')" class="text-[8px] font-black uppercase text-indigo-400">Cheats</button>
                            <button onclick="deleteGame('${game.name}')" class="text-[8px] font-black uppercase text-red-900">Delete</button>
                        </div>`;
                    sec.querySelector('.game-grid').appendChild(card);
                });
                container.appendChild(sec);
            });
        }

        function launchGame(name) {
            db.transaction("games").objectStore("games").get(name).onsuccess = e => {
                const game = e.target.result;
                currentFileName = game.name;
                
                // UI Wechsel
                document.getElementById('emu-layer').style.display = 'block';
                
                // EmulatorJS Config
                window.EJS_player = '#game-container';
                window.EJS_core = game.core;
                window.EJS_gameUrl = game.data;
                window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                window.EJS_startOnLoaded = true;
                window.EJS_settings = { 
                    "netplay_enabled": false, 
                    "buttons": { "menu": true }, 
                    "cheats": game.cheats || "" 
                };
                
                // Cloud Sync Event
                window.EJS_onSaveState = (d) => {
                    if(d.state) syncToCloud(currentFileName, d.state);
                };

                const s = document.createElement('script');
                s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.body.appendChild(s);
            };
        }

        async function openOptions(name) {
            currentOptGame = name;
            const game = await new Promise(res => db.transaction("games").objectStore("games").get(name).onsuccess = e => res(e.target.result));
            document.getElementById('opt-title').innerText = name.split('.')[0];
            document.getElementById('cheat-input').value = game.cheats || "";
            toggleOptions(true);
        }

        async function saveOptions() {
            const tx = db.transaction("games", "readwrite");
            const store = tx.objectStore("games");
            const game = await new Promise(res => store.get(currentOptGame).onsuccess = e => res(e.target.result));
            game.cheats = document.getElementById('cheat-input').value;
            store.put(game);
            tx.oncomplete = () => { toggleOptions(false); renderLibrary(); };
        }

        function toggleOptions(s) { document.getElementById('options-ui').classList.toggle('hidden', !s); }
        
        function deleteGame(n) { 
            if(confirm("Delete ROM?")) {
                db.transaction("games","readwrite").objectStore("games").delete(n).oncomplete = renderLibrary;
            }
        }

        // Fix für iOS vh Unit
        const setVh = () => {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        };
        window.addEventListener('resize', setVh);
        setVh();
    </script>
</body>
</html>
