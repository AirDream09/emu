<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RetroCloud v27.4 | Controller Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; --bg: #050507; }
        body { background: var(--bg); color: #fafafa; font-family: 'Inter', sans-serif; margin: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(18, 18, 22, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.2rem; }
        .game-card { 
            background: #0f0f13; border-radius: 1.2rem; border: 1px solid rgba(255,255,255,0.03); 
            padding: 1.2rem; display: flex; flex-direction: column; transition: 0.2s; cursor: pointer;
        }
        .game-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .game-title { font-size: 0.85rem; font-weight: 800; text-transform: uppercase; word-break: break-word; line-height: 1.3; color: #fff; margin-bottom: 1rem; }
        #emu-layer { display: none; position: fixed; inset: 0; z-index: 9999; background: #000; }
        #game-container { width: 100%; height: 100%; }
        .exit-trigger {
            position: fixed; top: 15px; right: 15px; width: 35px; height: 35px;
            background: rgba(255,255,255,0.1); border-radius: 50%; z-index: 10005;
            display: flex; align-items: center; justify-content: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5);
            font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .exit-trigger:hover { background: #ef4444; color: white; width: 90px; border-radius: 20px; }
        .exit-trigger:hover::after { content: ' EXIT'; font-size: 10px; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="main-ui" class="max-w-4xl mx-auto px-6 pt-10 pb-32">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none text-white">Retro<span class="text-indigo-500">Cloud</span></h1>
                <p class="text-[8px] font-bold text-zinc-500 uppercase tracking-[0.3em] mt-2 ml-1">v27.4 Xbox Fix Edition</p>
            </div>
            <button onclick="loginToDropbox()" class="glass px-4 py-2 rounded-xl text-[9px] font-black uppercase text-zinc-400 hover:text-white transition-all">Link Cloud</button>
        </header>

        <label class="block mb-12 p-8 rounded-[2rem] bg-indigo-600/5 border-2 border-dashed border-indigo-600/20 cursor-pointer text-center active:scale-[0.99] transition-all group">
            <input type="file" id="rom-upload" class="hidden" accept=".gba,.gb,.gbc,.nes,.sfc,.smc,.md,.n64,.nds">
            <span class="block text-2xl mb-2 group-hover:scale-110 transition-transform">🕹️</span>
            <span class="block text-[10px] font-black uppercase italic text-indigo-400">Import Game to Library</span>
        </label>

        <div id="library-container" class="space-y-12"></div>
    </div>

    <div id="options-ui" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
        <div class="glass w-full max-w-md p-8 rounded-[2.5rem]">
            <h2 id="opt-title" class="text-xl font-black uppercase italic mb-6 text-center text-white">Game Options</h2>
            <textarea id="cheat-input" class="w-full h-40 bg-zinc-900 rounded-2xl p-4 text-[10px] font-mono border border-white/5 outline-none mb-6 text-indigo-300" placeholder="Cheats..."></textarea>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="saveOptions()" class="py-4 bg-indigo-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-indigo-500/20">Save</button>
                <button onclick="toggleOptions(false)" class="py-4 bg-zinc-800 rounded-2xl font-black text-[10px] uppercase text-zinc-400">Back</button>
            </div>
        </div>
    </div>

    <div id="emu-layer">
        <div class="exit-trigger" onclick="location.reload()">✖</div>
        <div id="game-container"></div>
    </div>

    <script>
        let db;

        const request = indexedDB.open("RetroCloud_v27_4", 2);
        request.onupgradeneeded = e => {
            const dbRef = e.target.result;
            if (!dbRef.objectStoreNames.contains("games")) dbRef.createObjectStore("games", { keyPath: "name" });
            if (!dbRef.objectStoreNames.contains("settings")) dbRef.createObjectStore("settings", { keyPath: "id" });
        };
        request.onsuccess = e => { db = e.target.result; renderLibrary(); };

        document.getElementById('rom-upload').onchange = e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = () => {
                const ext = f.name.split('.').pop().toLowerCase();
                const coreMap = {'gba':'gba','gb':'gba','gbc':'gba','nes':'nes','sfc':'snes','smc':'snes','md':'segaMD','n64':'n64','nds':'desmume'};
                db.transaction("games","readwrite").objectStore("games").put({
                    name: f.name, core: coreMap[ext] || 'gba', data: r.result, cheats: ""
                }).oncomplete = renderLibrary;
            };
            r.readAsDataURL(f);
        };

        async function renderLibrary() {
            const games = await new Promise(res => db.transaction("games").objectStore("games").getAll().onsuccess = e => res(e.target.result));
            const container = document.getElementById('library-container');
            container.innerHTML = "";
            if(games.length === 0) {
                container.innerHTML = `<p class="text-center py-20 text-[10px] font-black uppercase text-zinc-700 italic tracking-widest">Library Empty</p>`;
                return;
            }
            const systems = [...new Set(games.map(g => g.core))];
            systems.forEach(sys => {
                const sec = document.createElement('div');
                sec.innerHTML = `<h2 class="text-[9px] font-black text-zinc-600 uppercase tracking-[0.4em] mb-4">${sys} Archive</h2><div class="game-grid"></div>`;
                const grid = sec.querySelector('.game-grid');
                games.filter(g => g.core === sys).forEach(game => {
                    const card = document.createElement('div');
                    card.className = "game-card";
                    card.innerHTML = `<div class="game-title" onclick="launchGame('${game.name}')">${game.name.split('.')[0]}</div>
                        <div class="mt-auto flex gap-4 pt-4 border-t border-white/5">
                            <button onclick="openOptions('${game.name}')" class="text-[8px] font-black uppercase text-indigo-400">Options</button>
                            <button onclick="deleteGame('${game.name}')" class="text-[8px] font-black uppercase text-red-900">Delete</button>
                        </div>`;
                    grid.appendChild(card);
                });
                container.appendChild(sec);
            });
        }

        async function launchGame(name) {
            const game = await new Promise(res => db.transaction("games").objectStore("games").get(name).onsuccess = e => res(e.target.result));
            const savedConfig = await new Promise(res => db.transaction("settings").objectStore("settings").get("input_config").onsuccess = e => res(e.target.result));

            document.getElementById('emu-layer').style.display = 'block';
            
            window.EJS_player = '#game-container';
            window.EJS_core = game.core;
            window.EJS_gameUrl = game.data;
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            window.EJS_startOnLoaded = true;
            
            window.EJS_settings = {
                "full_screen": true,
                "cheats": game.cheats || "",
                "wait_for_input": true, 
                "show_full_settings": true,
                "key_bind_timeout": 0, // WICHTIG: Verhindert automatisches "Fertig"
                "input_menu_fixed": true 
            };

            if (savedConfig) { window.EJS_extraConfig = savedConfig.data; }

            const s = document.createElement('script');
            s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            document.body.appendChild(s);

            // Automatischer Speicher-Listener
            window.addEventListener('message', function(e) {
                if(e.data && e.data.type === 'EJS_SAVE_SETTINGS') {
                    db.transaction("settings", "readwrite").objectStore("settings").put({
                        id: "input_config",
                        data: e.data.settings
                    });
                }
            });
        }

        async function openOptions(name) {
            currentOptGame = name;
            const game = await new Promise(res => db.transaction("games").objectStore("games").get(name).onsuccess = e => res(e.target.result));
            document.getElementById('opt-title').innerText = name.split('.')[0];
            document.getElementById('cheat-input').value = game.cheats || "";
            toggleOptions(true);
        }

        async function saveOptions() {
            const tx = db.transaction("games", "readwrite");
            const store = tx.objectStore("games");
            const game = await new Promise(res => store.get(currentOptGame).onsuccess = e => res(e.target.result));
            game.cheats = document.getElementById('cheat-input').value;
            store.put(game);
            tx.oncomplete = () => { toggleOptions(false); renderLibrary(); };
        }

        function toggleOptions(s) { document.getElementById('options-ui').classList.toggle('hidden', !s); }
        function deleteGame(n) { if(confirm("Delete?")) db.transaction("games","readwrite").objectStore("games").delete(n).oncomplete = renderLibrary; }
        function loginToDropbox() { alert("Cloud Sync Key required."); }
    </script>
</body>
</html>
