<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RetroCloud v26(1.0) - Drive Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background: #050507; color: #f4f4f5; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(20, 20, 25, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .grid-main { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        .game-card { cursor: pointer; border-radius: 1.2rem; background: #111114; padding: 1rem; border: 1px solid rgba(255,255,255,0.03); transition: 0.2s; }
        .game-card:hover { border-color: #6366f1; }
        #emu-layer { display: none; position: fixed; inset: 0; z-index: 9999; background: #000; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body id="app-root">

    <div id="main-ui" class="max-w-5xl mx-auto p-6 pb-24">
        <header class="flex flex-col items-center py-8 gap-4 text-center">
            <h1 class="text-4xl font-black italic uppercase tracking-tighter">RetroCloud <span class="text-indigo-500">v26</span></h1>
            <div id="drive-status" class="text-[10px] uppercase font-bold text-zinc-500">Cloud Status: Offline</div>
        </header>

        <div class="flex justify-between items-center mb-8">
            <div class="flex bg-zinc-900 rounded-xl p-1 border border-white/5">
                <button onclick="toggleSettings(true)" class="px-5 py-3 rounded-xl text-[10px] font-black uppercase glass">Optionen & Cloud</button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-12">
            <label class="bg-indigo-600 p-6 rounded-[1.5rem] cursor-pointer active:scale-95 transition-transform text-center">
                <input type="file" id="file-save" class="hidden" accept=".gba,.gb,.gbc,.sfc,.nes,.zip">
                <span class="block text-xs font-black uppercase italic">ROM Speichern</span>
            </label>
            <label class="bg-zinc-800 p-6 rounded-[1.5rem] cursor-pointer active:scale-95 transition-transform text-center border border-white/5">
                <input type="file" id="file-direct" class="hidden">
                <span class="block text-xs font-black uppercase italic text-indigo-400">Direkt Boot</span>
            </label>
        </div>

        <div id="library-content" class="space-y-8">
            </div>
    </div>

    <div id="settings-ui" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-black/95 p-6">
        <div class="glass max-w-sm w-full p-8 rounded-[2rem]">
            <h2 class="text-xl font-black uppercase mb-6 italic text-center">Cloud & System</h2>
            <div class="space-y-3">
                <button id="drive-auth-btn" onclick="handleAuthClick()" class="w-full py-4 bg-white text-black rounded-xl font-black text-xs uppercase">Connect Google Drive</button>
                <button onclick="syncSaves()" class="w-full py-3 bg-indigo-600 rounded-xl text-[10px] font-bold uppercase">Spielstände synchronisieren</button>
                <hr class="border-white/10 my-4">
                <button onclick="exportData()" class="w-full py-3 bg-zinc-800 rounded-xl text-[10px] font-bold uppercase">Library Backup (.json)</button>
                <button onclick="toggleSettings(false)" class="w-full py-4 text-zinc-400 font-bold text-xs uppercase">Schließen</button>
            </div>
        </div>
    </div>

    <div id="emu-layer">
        <div class="absolute top-4 left-4 z-[10000]">
            <button onclick="location.reload()" class="bg-red-600 text-white px-6 py-2 rounded-full text-[10px] font-black uppercase">Beenden</button>
        </div>
        <div id="game-container"></div>
    </div>

    <script>
        let db;
        const extensionMap = { 'gba':'gba','gb':'gba','gbc':'gba','sfc':'snes','nes':'nes','zip':'gba' };

        // 1. IndexedDB Initialisierung
        const req = indexedDB.open("RetroCloud_v26", 1);
        req.onupgradeneeded = e => {
            const store = e.target.result.createObjectStore("games", { keyPath: "name" });
            e.target.result.createObjectStore("saves", { keyPath: "gameName" }); // Separater Store für Saves
        };
        req.onsuccess = e => { db = e.target.result; renderLibrary(); };

        // 2. ROM Import
        document.getElementById('file-save').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = () => {
                db.transaction("games","readwrite").objectStore("games").put({
                    name: f.name, 
                    core: extensionMap[f.name.split('.').pop().toLowerCase()] || 'gba', 
                    data: r.result
                }).oncomplete = renderLibrary;
            };
            r.readAsDataURL(f);
        };

        // 3. Bibliothek rendern
        async function renderLibrary() {
            const container = document.getElementById('library-content');
            const games = await new Promise(res => db.transaction("games").objectStore("games").getAll().onsuccess = e => res(e.target.result));
            
            if(games.length === 0) {
                container.innerHTML = "<p class='text-center text-zinc-600 text-xs uppercase font-bold'>Keine Spiele in der Library</p>";
                return;
            }

            container.innerHTML = "";
            const cores = [...new Set(games.map(g => g.core))];
            
            cores.forEach(core => {
                const section = document.createElement('div');
                section.innerHTML = `<h3 class="text-indigo-500 text-[10px] font-black uppercase mb-3 tracking-widest">${core} System</h3>`;
                const grid = document.createElement('div');
                grid.className = "grid-main";
                
                games.filter(g => g.core === core).forEach(game => {
                    const card = document.createElement('div');
                    card.className = "game-card";
                    card.innerHTML = `
                        <div class="text-[11px] font-bold truncate uppercase mb-2">${game.name.split('.')[0]}</div>
                        <div class="flex justify-between items-center">
                            <button onclick="startStored('${game.name}')" class="text-indigo-400 text-[9px] font-black uppercase">Start</button>
                            <button onclick="deleteGame('${game.name}')" class="text-zinc-600 text-[9px] font-black uppercase">Del</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        // 4. Emulator Launch
        async function startStored(name) {
            const game = await new Promise(res => db.transaction("games").objectStore("games").get(name).onsuccess = e => res(e.target.result));
            launch(game.data, game.core);
        }

        function launch(url, core) {
            document.getElementById('emu-layer').style.display = 'block';
            window.EJS_player = '#game-container';
            window.EJS_core = core;
            window.EJS_gameUrl = url;
            window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
            window.EJS_startOnLoaded = true;
            
            // Wichtig: EmulatorJS Save Management
            window.EJS_onSaveState = (data) => {
                console.log("SaveState generiert");
                // Hier könnte man den Save direkt in Drive pushen
            };

            const s = document.createElement('script');
            s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
            document.body.appendChild(s);
        }

        function toggleSettings(s) { document.getElementById('settings-ui').classList.toggle('hidden', !s); }

        function deleteGame(n) { if(confirm("Spiel aus Library löschen?")) { db.transaction("games","readwrite").objectStore("games").delete(n).oncomplete = renderLibrary; } }

        // 5. GOOGLE DRIVE LOGIK (Konzeptuell vorbereitet)
        function handleAuthClick() {
            // Hier müsstest du deine Client-ID von der Google Cloud Console eintragen
            alert("Für Google Drive musst du eine Client-ID in der Google Cloud Console erstellen und im Code unter 'gapi' konfigurieren.");
            // Beispielhafter Statuswechsel
            document.getElementById('drive-status').innerText = "Cloud Status: Connected (Demo)";
            document.getElementById('drive-status').classList.replace('text-zinc-500', 'text-green-500');
        }

        async function syncSaves() {
            alert("Synchronisiere Spielstände mit Google Drive...");
            // Logik: 
            // 1. Hole alle Dateien aus dem IndexedDB 'saves' Store.
            // 2. Nutze gapi.client.drive.files.create um sie hochzuladen.
        }
    </script>
</body>
</html>
