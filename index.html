<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RetroCloud v3.3</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #6366f1; --bg: #000000; }
        body { background: var(--bg); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        #main-ui { height: 100%; overflow-y: auto; padding: env(safe-area-inset-top) 20px 100px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        
        #emu-layer { 
            display: none; position: fixed; inset: 0; z-index: 9999; background: #000;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        #game-container { width: 100%; height: 100%; }

        /* Exit Button */
        .exit-btn {
            position: fixed; top: env(safe-area-inset-top, 20px); right: 20px;
            width: 40px; height: 40px; z-index: 10005;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.3);
        }

        /* Dieser Style versucht die Buttons zu erzwingen, falls sie keine Inline-Styles haben */
        #game-container div[id*="start"], #game-container div[id*="select"] {
            bottom: 20px !important;
        }
    </style>
</head>
<body>

    <div id="main-ui">
        <header class="py-8">
            <h1 class="text-3xl font-black italic uppercase">Retro<span class="text-indigo-500">Cloud</span></h1>
        </header>

        <label class="block p-10 mb-8 border-2 border-dashed border-indigo-500/30 rounded-[2rem] text-center cursor-pointer active:scale-95 transition-all">
            <input type="file" id="rom-upload" class="hidden" accept=".gba,.gb,.gbc,.nes,.sfc,.smc,.md">
            <span class="text-2xl">📥</span><br>
            <span class="text-xs font-bold uppercase text-indigo-400">ROM importieren</span>
        </label>

        <div id="library-container" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="emu-layer">
        <div class="exit-btn" onclick="location.reload()">✖</div>
        <div id="game-container"></div>
    </div>

    <script>
        let db;
        const request = indexedDB.open("RetroCloud_V3", 1);
        request.onupgradeneeded = e => e.target.result.createObjectStore("games", { keyPath: "name" });
        request.onsuccess = e => { db = e.target.result; renderLibrary(); };

        document.getElementById('rom-upload').onchange = e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = () => {
                const ext = f.name.split('.').pop().toLowerCase();
                const coreMap = {'gba':'gba','gb':'gba','gbc':'gba','nes':'nes','sfc':'snes','smc':'snes','md':'segaMD'};
                db.transaction("games","readwrite").objectStore("games").put({
                    name: f.name, core: coreMap[ext] || 'gba', data: r.result
                }).oncomplete = renderLibrary;
            };
            r.readAsDataURL(f);
        };

        async function renderLibrary() {
            const games = await new Promise(res => db.transaction("games").objectStore("games").getAll().onsuccess = e => res(e.target.result));
            const container = document.getElementById('library-container');
            container.innerHTML = games.map(game => `
                <div class="glass-card p-4 flex flex-col h-32 justify-between" onclick="launchGame('${game.name}')">
                    <div class="text-[10px] font-bold truncate text-zinc-400 uppercase tracking-tighter">${game.core}</div>
                    <div class="text-sm font-black leading-tight">${game.name.split('.')[0]}</div>
                    <div class="text-[8px] text-red-500 uppercase font-bold" onclick="event.stopPropagation(); deleteGame('${game.name}')">Löschen</div>
                </div>
            `).join('');
        }

        function launchGame(name) {
            db.transaction("games").objectStore("games").get(name).onsuccess = e => {
                const game = e.target.result;
                document.getElementById('emu-layer').style.display = 'block';
                
                window.EJS_player = '#game-container';
                window.EJS_core = game.core;
                window.EJS_gameUrl = game.data;
                window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                window.EJS_startOnLoaded = true;
                window.EJS_settings = { 
                    "buttons": { "menu": true, "start": true, "select": true, "fastForward": true, "slowMotion": true }
                };
                
                const s = document.createElement('script');
                s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.body.appendChild(s);

                // --- DER FIX: FORCE BUTTON POSITIONING ---
                const buttonFixer = setInterval(() => {
                    // Suche nach den Buttons im DOM (auch innerhalb von EmulatorJS Containern)
                    const startBtn = document.querySelector('div[id*="start"]');
                    const selectBtn = document.querySelector('div[id*="select"]');
                    const fastBtn = document.querySelector('div[id*="fastForward"]');
                    const slowBtn = document.querySelector('div[id*="slowMotion"]');

                    if (window.innerHeight < window.innerWidth) { // Nur im Querformat
                        if(startBtn) {
                            startBtn.style.left = "140px";
                            startBtn.style.bottom = "20px";
                            startBtn.style.top = "auto";
                            startBtn.style.right = "auto";
                            startBtn.style.position = "fixed";
                        }
                        if(selectBtn) {
                            selectBtn.style.right = "140px";
                            selectBtn.style.bottom = "20px";
                            selectBtn.style.top = "auto";
                            selectBtn.style.left = "auto";
                            selectBtn.style.position = "fixed";
                        }
                        if(fastBtn) {
                            fastBtn.style.right = "80px";
                            fastBtn.style.top = "20px";
                            fastBtn.style.position = "fixed";
                        }
                        if(slowBtn) {
                            slowBtn.style.left = "80px";
                            slowBtn.style.top = "20px";
                            slowBtn.style.position = "fixed";
                        }
                    }
                    
                    // Wenn das Spiel läuft, können wir das Intervall verlangsamen
                    if (startBtn && selectBtn) {
                        // Wir lassen es laufen, falls der User das Handy dreht
                    }
                }, 500);
            };
        }

        function deleteGame(n) { if(confirm("Löschen?")) db.transaction("games","readwrite").objectStore("games").delete(n).oncomplete = renderLibrary; }
    </script>
</body>
</html>
