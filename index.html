<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroCloud Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        #emu-layer { display: none; position: fixed; inset: 0; background: black; z-index: 50; }
        #game-container { width: 100%; height: 100vh; }
        .game-card:hover { transform: translateY(-5px); transition: all 0.3s; border-color: #3b82f6; }
    </style>
</head>
<body class="p-6">

    <header class="max-w-6xl mx-auto flex justify-between items-center mb-10">
        <div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">RetroCloud</h1>
            <div class="flex items-center gap-2 mt-1">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]"></div>
                <span id="status-text" class="text-xs text-slate-400 tracking-widest uppercase">Cloud Offline</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="loginToDropbox()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm font-medium transition">Dropbox Login</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto">
        <section class="mb-12 bg-slate-800/40 p-6 rounded-2xl border border-slate-700 backdrop-blur-sm">
            <h2 class="text-lg font-semibold mb-4">Spiel hinzufügen</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="game-name" placeholder="Name" class="bg-slate-900 border-slate-700 rounded-lg p-2 text-sm border outline-none">
                <input type="text" id="game-url" placeholder="ROM URL (Direct Link)" class="bg-slate-900 border-slate-700 rounded-lg p-2 text-sm border outline-none">
                <select id="game-core" class="bg-slate-900 border-slate-700 rounded-lg p-2 text-sm border">
                    <option value="gba">GBA</option>
                    <option value="snes">SNES</option>
                    <option value="nes">NES</option>
                </select>
                <button onclick="addGame()" class="bg-emerald-600 hover:bg-emerald-500 rounded-lg font-bold transition">Speichern</button>
            </div>
        </section>

        <div id="library" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
    </main>

    <div id="emu-layer">
        <div class="absolute top-4 left-4 z-[60] flex gap-2">
            <button onclick="downloadCurrentSave()" class="bg-slate-800/80 hover:bg-slate-700 text-white px-3 py-1 rounded text-xs border border-white/20">💾 Save auf Gerät laden</button>
            <label class="bg-slate-800/80 hover:bg-slate-700 text-white px-3 py-1 rounded text-xs border border-white/20 cursor-pointer">
                📂 Lokalen Save importieren
                <input type="file" id="import-save" class="hidden" onchange="importLocalSave(event)">
            </label>
        </div>
        <button onclick="location.reload()" class="absolute top-4 right-4 z-[60] bg-red-500/80 hover:bg-red-500 text-white px-4 py-1 rounded-full text-sm">✕ Beenden</button>
        <div id="game-container"></div>
    </div>

    <script>
        const DBX_APP_KEY = 'jd1mz866barkxm1'; 
        const REDIRECT_URI = window.location.href.split('#')[0];
        let db, currentFileName = "", lastCapturedState = null;

        // DB Setup
        const request = indexedDB.open("RetroCloud_DBX", 1);
        request.onsuccess = e => { db = e.target.result; renderLibrary(); checkCloudStatus(); };
        request.onupgradeneeded = e => { e.target.result.createObjectStore("games", { keyPath: "name" }); };

        function loginToDropbox() {
            window.location.href = `https://www.dropbox.com/oauth2/authorize?client_id=${jd1mz866barkxm1}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
        }

        function checkCloudStatus() {
            if (window.location.hash.includes("access_token=")) {
                localStorage.setItem("dbx_token", new URLSearchParams(window.location.hash.substring(1)).get("access_token"));
                window.location.hash = "";
            }
            if (localStorage.getItem("dbx_token")) {
                document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]";
                document.getElementById('status-text').innerText = "Cloud Active";
            }
        }

        // --- CLOUD LOGIC ---
        async function syncToCloud(fileName, uint8Array) {
            const token = localStorage.getItem("dbx_token");
            if (!token) return;
            await fetch('https://content.dropboxapi.com/2/files/upload', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Dropbox-API-Arg': JSON.stringify({ path: '/' + fileName + '.sav', mode: 'overwrite' }), 'Content-Type': 'application/octet-stream' },
                body: uint8Array
            });
        }

        async function loadFromCloud(fileName) {
            const token = localStorage.getItem("dbx_token");
            if (!token) return null;
            try {
                const res = await fetch('https://content.dropboxapi.com/2/files/download', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Dropbox-API-Arg': JSON.stringify({ path: '/' + fileName + '.sav' }) }
                });
                return res.ok ? await res.arrayBuffer() : null;
            } catch (e) { return null; }
        }

        // --- MANUELLE SAVE LOGIK ---
        function downloadCurrentSave() {
            if (!lastCapturedState) return alert("Kein Spielstand im Speicher. Bitte erst im Spiel speichern!");
            const blob = new Blob([lastCapturedState], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `${currentFileName}.sav`;
            a.click();
        }

        async function importLocalSave(event) {
            const file = event.target.files[0];
            if (!file) return;
            const buffer = await file.arrayBuffer();
            // Dem Emulator mitteilen, dass er einen neuen State laden soll
            // Hinweis: EmulatorJS muss laufen, um das zur Laufzeit zu triggern. 
            // Am sichersten ist es, den Import vor dem Start zu machen oder die Seite neu zu laden.
            alert("Save geladen. Starte das Spiel neu, um ihn zu nutzen!");
            syncToCloud(currentFileName, new Uint8Array(buffer));
        }

        // --- LIBRARY UI ---
        function addGame() {
            const name = document.getElementById('game-name').value;
            const data = document.getElementById('game-url').value;
            const core = document.getElementById('game-core').value;
            if(!name || !data) return;
            const tx = db.transaction("games", "readwrite");
            tx.objectStore("games").add({ name, data, core });
            tx.oncomplete = () => { renderLibrary(); };
        }

        function renderLibrary() {
            const container = document.getElementById('library');
            container.innerHTML = "";
            db.transaction("games").objectStore("games").getAll().onsuccess = e => {
                e.target.result.forEach(game => {
                    const div = document.createElement('div');
                    div.className = "game-card bg-slate-800 border border-slate-700 p-4 rounded-xl cursor-pointer text-center";
                    div.innerHTML = `<div class="text-3xl mb-2">🕹️</div><div class="font-bold text-sm">${game.name}</div><div class="text-[10px] text-slate-500">${game.core}</div>`;
                    div.onclick = () => launchGame(game.name);
                    container.appendChild(div);
                });
            };
        }

        // --- EMULATOR LAUNCH ---
        async function launchGame(name) {
            db.transaction("games").objectStore("games").get(name).onsuccess = async e => {
                const game = e.target.result;
                currentFileName = game.name;
                document.getElementById('emu-layer').style.display = 'block';

                const cloudBuffer = await loadFromCloud(currentFileName);
                
                window.EJS_player = '#game-container';
                window.EJS_core = game.core;
                window.EJS_gameUrl = game.data;
                window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                window.EJS_startOnLoaded = true;

                if (cloudBuffer) {
                    window.EJS_state = new Uint8Array(cloudBuffer);
                    lastCapturedState = window.EJS_state;
                }

                window.EJS_onSaveState = (d) => {
                    lastCapturedState = d.state; // Für den manuellen Download merken
                    syncToCloud(currentFileName, d.state); // Automatisch in die Cloud
                };

                const s = document.createElement('script');
                s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.body.appendChild(s);
            };
        }
    </script>
</body>
</html>
