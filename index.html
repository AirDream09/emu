<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RetroCloud v3.0</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #6366f1; --bg: #000000; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; height: 100vh; overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Cards */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.07); }

        /* Smooth Scroll */
        #main-ui {
            height: 100%; overflow-y: auto;
            padding: env(safe-area-inset-top) 20px calc(env(safe-area-inset-bottom) + 20px);
            scroll-behavior: smooth;
        }

        /* Responsive Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 16px;
        }

        @media (orientation: landscape) {
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }

        /* Emulator Layer */
        #emu-layer {
            display: none; position: fixed; inset: 0; z-index: 9999; background: #000;
        }

        .exit-btn {
            position: fixed; top: env(safe-area-inset-top, 20px); right: 20px;
            width: 44px; height: 44px; z-index: 10000;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Custom Upload Area */
        .upload-zone {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(168, 85, 247, 0.1) 100%);
            border: 2px dashed rgba(99, 102, 241, 0.3);
            border-radius: 28px;
        }

        /* Hide Scrollbar */
        #main-ui::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="main-ui">
        <header class="py-8 flex justify-between items-end">
            <div>
                <p class="text-indigo-400 text-[10px] font-bold uppercase tracking-[0.3em] mb-1">Your Collection</p>
                <h1 class="text-4xl font-extrabold tracking-tight">Retro<span class="text-indigo-500">Cloud</span></h1>
            </div>
            <div class="h-10 w-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 opacity-80 blur-[2px]"></div>
        </header>

        <label class="upload-zone block p-10 mb-10 text-center cursor-pointer active:opacity-70 transition-all">
            <input type="file" id="rom-upload" class="hidden" accept=".gba,.gb,.gbc,.nes,.sfc,.smc,.md">
            <div class="text-3xl mb-3">✨</div>
            <span class="text-sm font-semibold text-indigo-200">New Game hinzufügen</span>
        </label>

        <div id="library-container" class="space-y-10">
            </div>
    </div>

    <div id="options-ui" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md">
        <div class="glass-card w-full max-w-sm p-6">
            <h2 id="opt-title" class="text-xl font-bold mb-4 text-center">Settings</h2>
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest mb-2 px-1">Cheat Codes (Raw)</p>
            <textarea id="cheat-input" class="w-full h-32 bg-white/5 rounded-xl p-3 text-xs font-mono border border-white/10 outline-none mb-4 text-indigo-300"></textarea>
            <div class="flex gap-3">
                <button onclick="saveOptions()" class="flex-1 py-3 bg-indigo-600 rounded-xl font-bold text-sm">Save</button>
                <button onclick="toggleOptions(false)" class="flex-1 py-3 bg-white/10 rounded-xl font-bold text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <div id="emu-layer">
        <button class="exit-btn" onclick="location.reload()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <div id="game-container" style="width:100vw;height:100vh;"></div>
    </div>

    <script>
        let db, currentFileName = "", currentOptGame = "";

        // DB Setup
        const request = indexedDB.open("RetroCloud_V3", 1);
        request.onupgradeneeded = e => {
            e.target.result.createObjectStore("games", { keyPath: "name" });
        };
        request.onsuccess = e => { db = e.target.result; renderLibrary(); };

        // Library Logic
        document.getElementById('rom-upload').onchange = e => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = () => {
                const ext = f.name.split('.').pop().toLowerCase();
                const coreMap = {'gba':'gba','gb':'gba','gbc':'gba','nes':'nes','sfc':'snes','smc':'snes','md':'segaMD'};
                db.transaction("games","readwrite").objectStore("games").put({
                    name: f.name, core: coreMap[ext] || 'gba', data: r.result, cheats: ""
                }).oncomplete = renderLibrary;
            };
            r.readAsDataURL(f);
        };

        async function renderLibrary() {
            const games = await new Promise(res => db.transaction("games").objectStore("games").getAll().onsuccess = e => res(e.target.result));
            const container = document.getElementById('library-container');
            container.innerHTML = "";
            
            const cores = [...new Set(games.map(g => g.core))];
            if(games.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-zinc-600 font-medium">Noch keine Spiele importiert.</div>`;
            }

            cores.forEach(sys => {
                const sec = document.createElement('div');
                sec.innerHTML = `<h3 class="text-[11px] font-black text-zinc-500 uppercase tracking-[0.2em] mb-4 ml-1">${sys.replace('gba', 'Gameboy').replace('snes', 'Super Nintendo')}</h3><div class="game-grid"></div>`;
                
                games.filter(g => g.core === sys).forEach(game => {
                    const card = document.createElement('div');
                    card.className = "glass-card p-4 flex flex-col justify-between h-40 relative group";
                    card.innerHTML = `
                        <div class="absolute top-3 right-3 opacity-20 group-hover:opacity-100 transition-opacity" onclick="event.stopPropagation(); deleteGame('${game.name}')">
                             <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff4444" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                        </div>
                        <div onclick="launchGame('${game.name}')" class="flex-1">
                            <div class="w-10 h-10 bg-indigo-500/20 rounded-lg flex items-center justify-center mb-3">🎮</div>
                            <div class="text-xs font-bold leading-tight pr-4">${game.name.split('.')[0]}</div>
                        </div>
                        <button onclick="event.stopPropagation(); openOptions('${game.name}')" class="text-[9px] font-bold text-indigo-400/80 hover:text-indigo-300 uppercase mt-2">Config</button>
                    `;
                    sec.querySelector('.game-grid').appendChild(card);
                });
                container.appendChild(sec);
            });
        }

        function launchGame(name) {
            db.transaction("games").objectStore("games").get(name).onsuccess = e => {
                const game = e.target.result;
                document.getElementById('emu-layer').style.display = 'block';
                window.EJS_player = '#game-container';
                window.EJS_core = game.core;
                window.EJS_gameUrl = game.data;
                window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
                window.EJS_startOnLoaded = true;
                window.EJS_settings = { "buttons": { "menu": true }, "cheats": game.cheats || "" };
                
                const s = document.createElement('script');
                s.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                document.body.appendChild(s);
            };
        }

        async function openOptions(name) {
            currentOptGame = name;
            const game = await new Promise(res => db.transaction("games").objectStore("games").get(name).onsuccess = e => res(e.target.result));
            document.getElementById('opt-title').innerText = name.split('.')[0];
            document.getElementById('cheat-input').value = game.cheats || "";
            toggleOptions(true);
        }

        async function saveOptions() {
            const tx = db.transaction("games", "readwrite");
            const store = tx.objectStore("games");
            const game = await new Promise(res => store.get(currentOptGame).onsuccess = e => res(e.target.result));
            game.cheats = document.getElementById('cheat-input').value;
            store.put(game);
            tx.oncomplete = () => { toggleOptions(false); renderLibrary(); };
        }

        function toggleOptions(s) { document.getElementById('options-ui').classList.toggle('hidden', !s); }
        function deleteGame(n) { if(confirm("Spiel wirklich löschen?")) db.transaction("games","readwrite").objectStore("games").delete(n).oncomplete = renderLibrary; }
    </script>
</body>
</html>
